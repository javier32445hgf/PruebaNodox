<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Órdenes - Producción</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="../config.js"></script>
    <script defer src="ordenes.js"></script>
</head>

<body>
<div class="dashboard">


    <div class="sidebar">
        <h2><img src="../img/nodox_logo.png" class="logo-sidebar"></h2>

        <a href="./produccion.html">Dashboard</a>
        <a href="./inventario.html">Inventario</a>
        <a href="./servicios.html">Servicios</a>
        <a class="activo" href="./ordenes.html">Órdenes Trabajo</a>
        <a href="./mensajes.html">Mensajes</a>

        <a href="../login/login.html" class="cerrar-sesion">⏻ Cerrar sesión</a>
    </div>

   
    <div class="main">
        <div class="header">
            <h1>Órdenes de Trabajo</h1>
        </div>

        <table class="tabla">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Descripción</th>
                    <th>Opciones</th>
                </tr>
            </thead>
            <tbody id="tabla-ordenes"></tbody>
        </table>
    </div>
</div>


<div id="modal-detalle" class="modal">
    <div class="modal-content">

        <span class="cerrar" onclick="cerrarModal()">&times;</span>

        <h2>Detalle de Orden</h2>

        <div id="detalle-contenido"></div>

        <hr>

        <label><strong>Cambiar estado:</strong></label>
        <select id="estado-select">
            <option value="Pendiente">Pendiente</option>
            <option value="En Proceso">En Proceso</option>
            <option value="Terminado">Terminado</option>
        </select>

        <button id="btn-guardar-estado">Guardar Estado</button>
    </div>
</div>


</body>
</html>
