<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario - NODOX</title>
    <link rel="stylesheet" href="../css/dashboard.css">

    <!-- jsPDF + AutoTable (para PDF) -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.29/dist/jspdf.plugin.autotable.min.js"></script>
</head>

<body>

<div class="dashboard">

    <div class="sidebar">
        <h2>NODOX</h2>
        <a href="admin.html">Menu Principal</a>
        <a href="cotizaciones.html">Cotizaciones</a>
        <a href="servicios.html">Servicios</a>
        <a href="ordenes.html">Órdenes Trabajo</a>
        <a href="mensajes.html">Mensajes</a>
        <a href="usuarios.html">Usuarios</a>
        <a href="../login/login.html">Cerrar sesión</a>
    </div>

    <div class="main">

        <div class="header">
            <h1>Inventario</h1>

            <button class="btn-crear" onclick="irCrearProducto()">
                + Agregar producto
            </button>

            <button type="button" class="btn-actualizar" onclick="cargarInventario()">
                🔄 Actualizar
            </button>

            <!-- ✅ NUEVO BOTÓN PDF -->
            <button type="button" class="btn-actualizar" onclick="generarPDFInventario()">
                📄 Exportar PDF
            </button>
        </div>

        <input 
            type="text" 
            id="buscador" 
            class="input-buscar" 
            placeholder="Buscar producto..."
            onkeyup="filtrarInventario()"
        >
        <br><br>

        <table class="tabla">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Unidad</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Opciones</th>
                </tr>
            </thead>

            <tbody id="tablaInventario"></tbody>
        </table>

    </div>

</div>

<script src="../config.js"></script>
<script src="inventario.js"></script>
</body>
</html>
